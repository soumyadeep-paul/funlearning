<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Shooter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="start-screen" class="overlay">
            <h1 class="bounce">Math Shooter!</h1>
            <div class="input-group">
                <input type="text" id="player-name" placeholder="Enter Your Name" maxlength="12">
            </div>
            <div class="theme-selection">
                <button class="btn-theme sky" onclick="startGame('sky')">Sky Adventure</button>
                <button class="btn-theme underwater" onclick="startGame('underwater')">Deep Sea</button>
                <button class="btn-theme desert" onclick="startGame('desert')">Desert Quest</button>
            </div>
            <p class="age-hint">Target: 7-10 years old</p>
        </div>

        <div id="pause-screen" class="overlay hidden">
            <h1>Paused</h1>
            <button class="btn-main" onclick="togglePause()">Resume</button>
        </div>

        <div id="game-over-screen" class="overlay hidden">
            <h1 id="game-over-title">Game Over!</h1>
            <div class="stats-grid">
                <div class="stat-item">Score: <span id="final-score">0</span></div>
                <div class="stat-item">Correct: <span id="stat-correct">0</span></div>
                <div class="stat-item">Best Streak: <span id="stat-streak">0</span></div>
            </div>
            <button class="btn-main" onclick="location.reload()">Play Again</button>
        </div>

        <div id="level-up-overlay" class="level-up-msg hidden">LEVEL UP!</div>

        <div id="ui-layer">
            <div id="left-panel">
                <div id="equation-container">
                    <div id="equation-text">? + ? = ?</div>
                </div>
                <div id="lives-container">
                    <!-- Heart icons will be injected here -->
                </div>
            </div>
            <div id="stats-container">
                <button id="pause-btn" style="pointer-events: auto;" onclick="togglePause()">Pause</button>
                <div class="hud-item">Level: <span id="level-val">1</span></div>
                <div class="hud-item">Score: <span id="score-val">0</span></div>
                <div id="player-display"></div>
            </div>
        </div>

        <canvas id="game-canvas"></canvas>
    </div>
    <script src="math-logic.js"></script>
    <script src="game.js"></script>
</body>
</html>
