<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Shooter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="start-screen" class="overlay">
            <h1 class="bounce">Math Shooter!</h1>
            <div class="input-group">
                <input type="text" id="player-name" placeholder="Enter Your Name" maxlength="12">
            </div>

            <div class="avatar-selection">
                <p>Choose Your Superhero:</p>
                <div class="avatar-grid">
                    <div class="avatar-option selected" data-avatar="super-red" onclick="selectAvatar('super-red')">
                        <canvas id="preview-super-red" class="avatar-canvas" width="80" height="80"></canvas>
                        <span>Super Red</span>
                    </div>
                    <div class="avatar-option" data-avatar="cosmo-blue" onclick="selectAvatar('cosmo-blue')">
                        <canvas id="preview-cosmo-blue" class="avatar-canvas" width="80" height="80"></canvas>
                        <span>Cosmo Blue</span>
                    </div>
                    <div class="avatar-option" data-avatar="aqua-green" onclick="selectAvatar('aqua-green')">
                        <canvas id="preview-aqua-green" class="avatar-canvas" width="80" height="80"></canvas>
                        <span>Aqua Green</span>
                    </div>
                </div>
            </div>

            <button class="btn-play-large" onclick="startGameWithDefault()">PLAY!</button>

            <div class="theme-selection">
                <p>Theme:</p>
                <button class="btn-theme-small sky" onclick="setTheme('sky')">Sky</button>
                <button class="btn-theme-small underwater active" id="btn-underwater" onclick="setTheme('underwater')">Sea</button>
                <button class="btn-theme-small desert" onclick="setTheme('desert')">Desert</button>
            </div>
        </div>

        <div id="pause-screen" class="overlay hidden">
            <h1>Paused</h1>
            <button class="btn-main" onclick="togglePause()">Resume</button>
        </div>

        <div id="game-over-screen" class="overlay hidden">
            <h1 id="game-over-title">Game Over!</h1>
            <div class="stats-grid">
                <div class="stat-item">Score: <span id="final-score">0</span></div>
                <div class="stat-item">Correct: <span id="stat-correct">0</span></div>
                <div class="stat-item">Best Streak: <span id="stat-streak">0</span></div>
            </div>
            <button class="btn-main" onclick="location.reload()">Play Again</button>
        </div>

        <div id="level-up-overlay" class="level-up-msg hidden">LEVEL UP!</div>

        <div id="ui-layer">
            <div id="left-panel">
                <div id="equation-container">
                    <div id="equation-text">? + ? = ?</div>
                </div>
                <div id="lives-container">
                    <!-- Heart icons will be injected here -->
                </div>
            </div>
            <div id="stats-container">
                <button id="pause-btn" style="pointer-events: auto;" onclick="togglePause()">Pause</button>
                <div class="hud-item">Level: <span id="level-val">1</span></div>
                <div class="hud-item">Score: <span id="score-val">0</span></div>
                <div id="player-display"></div>
            </div>
        </div>

        <canvas id="game-canvas"></canvas>
    </div>
    <script src="math-logic.js"></script>
    <script src="game.js"></script>
</body>
</html>
